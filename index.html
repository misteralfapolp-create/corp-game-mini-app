<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корпоративные Игры v20</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="app">
        <div class="card profile-card">
            <div class="header">
                <img id="header-avatar" class="header-avatar" src="" alt="Аватар" onclick="openVkProfile()">
                <h2 id="player-name">Загрузка...</h2>
                <div id="owner-info" style="font-size:12px;color:#f44336;margin-top:4px;"></div>
                <div class="clan-name" id="clan-display"></div>
            </div>
            <div class="stats">
                <div class="stat stat-main"><div class="value" id="exp-value">0</div><div class="label">⭐ Опыт</div></div>
                <div class="stat"><div class="value" id="my-employees-count">0</div><div class="label">👥 Сотрудники</div></div>
                <div class="stat"><div class="value" id="my-income">0</div><div class="label">📈 Доход/час</div></div>
            </div>
            <button class="btn-invite-friend" id="invite-friend-btn">📨 Пригласить друга</button>
            <button class="btn-leave" id="quit-job-btn" style="display:none;">🚪 Уволиться (цена: ...)</button>
        </div>
        <div class="card collect-card" id="collect-panel" style="display:none;">
            <div class="collect-info"><span class="collect-amount" id="collect-amount">0</span><span class="collect-label">опыта готово</span></div>
            <button class="btn-collect" id="collect-btn">🔄 Собрать</button>
        </div>
        <div class="card">
            <div class="tab-bar">
                <div class="tab active" id="tab-market" onclick="switchTab('market')">🏪 Биржа</div>
                <div class="tab" id="tab-top" onclick="switchTab('top')">🏆 Топ</div>
            </div>
            <div id="top-subtabs" style="display:none;margin-bottom:8px;">
                <button class="subtab active" id="subtab-players" onclick="switchTopSubtab('players')">👤 Игроки</button>
                <button class="subtab" id="subtab-clans" onclick="switchTopSubtab('clans')">🏢 Кланы</button>
            </div>
            <div id="tab-content"></div>
        </div>
        <div class="card" id="my-team-panel">
            <div class="section-title">👥 Мои сотрудники (<span id="my-team-total">0</span>)</div>
            <div id="my-team-list"><p style="color:#888;text-align:center;">Загрузка...</p></div>
            <button class="btn-load-more" id="load-more-btn" style="display:none;">📥 Загрузить ещё</button>
        </div>
        <div class="card" id="clan-card" style="display:none;">
            <p id="status-text"></p>
            <button class="btn-leave" id="leave-clan-btn" style="display:none;">🚪 Выйти из клана</button>
        </div>
    </div>
    <div class="modal" id="player-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closePlayerModal()">✕</span>
            <div id="modal-player-header"></div>
            <p id="modal-player-stats"></p>
            <button class="btn-hire" id="modal-hire-btn" style="display:none;">💼 Нанять</button>
            <div id="modal-player-employees"></div>
            <button class="btn-back" onclick="closePlayerModal()">🔙 Закрыть</button>
        </div>
    </div>
    <div class="modal" id="clan-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeClanModal()">✕</span>
            <h2 id="modal-clan-name"></h2>
            <p id="modal-clan-stats"></p>
            <div id="modal-clan-members"></div>
            <button class="btn-join" id="modal-join-btn" style="display:none;">✅ Вступить (бесплатно)</button>
            <button class="btn-leave" id="modal-leave-btn" style="display:none;">🚪 Выйти из клана</button>
            <button class="btn-back" onclick="closeClanModal()">🔙 Закрыть</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
