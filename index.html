<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корпоративные Игры v17</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Карточка игрока -->
        <div class="card">
            <div class="header">
                <img id="header-avatar" class="header-avatar" src="" alt="Аватар">
                <h2 id="player-name">Загрузка...</h2>
                <div class="clan-name" id="clan-display"></div>
            </div>
            <div class="stats">
                <div class="stat stat-main"><div class="value" id="exp-value">0</div><div class="label">⭐ Опыт</div></div>
                <div class="stat"><div class="value" id="my-employees-count">0</div><div class="label">👥 Мои сотрудники</div></div>
                <div class="stat"><div class="value" id="my-income">0</div><div class="label">📈 Доход/час</div></div>
            </div>
        </div>

        <!-- Сбор опыта -->
        <div class="card" id="collect-panel" style="display:none;">
            <div class="collect-info">
                <div class="amount" id="collect-amount">0</div>
                <div class="label">🔬 Опыта готово к сбору</div>
                <div class="hint" id="collect-rate"></div>
            </div>
            <button class="btn-collect" id="collect-btn">🔄 СОБРАТЬ ОПЫТ</button>
        </div>

        <!-- Вкладки -->
        <div class="card" id="tabs-panel">
            <div class="tab-bar">
                <div class="tab active" id="tab-my-team" onclick="switchTab('my-team')">👥 Моя команда</div>
                <div class="tab" id="tab-market" onclick="switchTab('market')">🏪 Биржа</div>
                <div class="tab" id="tab-players" onclick="switchTab('players')">🏆 Топ-100</div>
                <div class="tab" id="tab-clans" onclick="switchTab('clans')">🏢 Кланы</div>
            </div>
            <div id="tab-content"></div>
        </div>

        <!-- Действия -->
        <div class="card" id="action-panel">
            <p id="status-text">Загрузка...</p>
            <button class="btn-leave" id="leave-clan-btn" style="display:none;">🚪 Выйти из клана</button>
            <div id="invite-block" style="display:none;">
                <p class="section-title">🔗 Реферальная ссылка</p>
                <input type="text" id="invite-link-input" readonly style="width:100%;padding:8px;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;font-size:12px;" onclick="this.select()">
                <button class="btn-copy" id="invite-copy-btn">📋 Скопировать</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно: сотрудники игрока -->
    <div class="modal" id="player-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closePlayerModal()">✕</span>
            <h2 id="modal-player-name"></h2>
            <p id="modal-player-stats"></p>
            <div id="modal-player-employees"></div>
            <button class="btn-back" onclick="closePlayerModal()" style="margin-top:10px;">🔙 Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно клана -->
    <div class="modal" id="clan-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeClanModal()">✕</span>
            <h2 id="modal-clan-name"></h2>
            <p id="modal-clan-stats"></p>
            <div id="modal-clan-members"></div>
            <button class="btn-join" id="modal-join-btn" style="display:none;">✅ Вступить в клан</button>
            <button class="btn-leave" id="modal-leave-btn" style="display:none;">🚪 Выйти из клана</button>
            <button class="btn-back" onclick="closeClanModal()" style="margin-top:10px;">🔙 Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
