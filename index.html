<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корпоративные Игры v4</title>
    
    <!-- СНАЧАЛА Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- ПОТОМ VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="app">
        <h2>Ваш статус:</h2>
        <p id="player-info">Загрузка...</p>
        <button id="force-init-btn" style="display: none; padding: 10px; margin: 10px;">Попробовать снова</button>
        <div id="owner-panel" style="display: none; margin-top: 20px;">
            <h3>Панель компании</h3>
            <ul id="jobless-list"></ul>
        </div>
    </div>

    <script>
        // ================= НАСТРОЙКИ SUPABASE =================
        var SUPABASE_URL = 'https://fcrjkfiodvfhzamayvoe.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjcmprZmlvZHZmaHphbWF5dm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTcwMTQsImV4cCI6MjA5OTY5MzAxNH0.C3Ls4QMoYWnFciuOURZ7-WLmGa4TWtBsedhURVNulKI';
        
        // Создаём клиент Supabase СРАЗУ (теперь библиотека уже загружена)
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var currentUserVkId = null;

        // ================= ЗАПУСК ПРИЛОЖЕНИЯ =================
        function startApp() {
            var infoElement = document.getElementById('player-info');
            
            if (typeof vkBridge === 'undefined') {
                infoElement.textContent = 'Ошибка: VK Bridge не загрузился';
                return;
            }

            infoElement.textContent = 'Инициализация VK...';
            
            vkBridge.send('VKWebAppInit')
                .then(function() {
                    console.log('VK Bridge готов');
                    initApp();
                })
                .catch(function(err) {
                    console.error('Ошибка VKWebAppInit:', err);
                    infoElement.textContent = 'Ошибка VK: ' + (err.message || 'неизвестная');
                    document.getElementById('force-init-btn').style.display = 'block';
                });
        }

        // ================= ГЛАВНАЯ ЛОГИКА =================
        async function initApp() {
            var infoElement = document.getElementById('player-info');
            infoElement.textContent = 'Получаем данные профиля...';

            try {
                var user = await vkBridge.send('VKWebAppGetUserInfo');
                currentUserVkId = user.id;
                console.log('VK User ID:', currentUserVkId);

                infoElement.textContent = 'Ищем вас в базе данных...';
                var result = await supabase
                    .from('players')
                    .select('*')
                    .eq('vk_id', currentUserVkId)
                    .maybeSingle();

                if (result.error) throw result.error;

                if (!result.data) {
                    infoElement.textContent = 'Регистрируем...';
                    var insertResult = await supabase
                        .from('players')
                        .insert([{ 
                            vk_id: currentUserVkId, 
                            first_name: user.first_name, 
                            last_name: user.last_name 
                        }]);

                    if (insertResult.error) throw insertResult.error;
                    location.reload();
                } else {
                    displayPlayerInfo(result.data);
                    if (result.data.company === 'Владелец') {
                        showOwnerPanel();
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                infoElement.textContent = 'Ошибка: ' + (error.message || JSON.stringify(error));
                document.getElementById('force-init-btn').style.display = 'block';
            }
        }

        function displayPlayerInfo(player) {
            var el = document.getElementById('player-info');
            if (player.company && player.company !== 'Биржа труда') {
                el.textContent = player.first_name + ' ' + player.last_name + ' — Работает в компании ' + player.company;
            } else {
                el.textContent = player.first_name + ' ' + player.last_name + ' — Безработный (Биржа труда)';
            }
        }

        async function showOwnerPanel() {
            document.getElementById('owner-panel').style.display = 'block';
            var listElement = document.getElementById('jobless-list');
            listElement.innerHTML = '<li>Загрузка...</li>';
            
            try {
                var result = await supabase
                    .from('players')
                    .select('*')
                    .eq('status', 'Биржа труда');

                if (result.error) throw result.error;
                
                listElement.innerHTML = ''; 
                if (result.data.length === 0) {
                    listElement.innerHTML = '<li>Нет безработных.</li>';
                    return;
                }

                result.data.forEach(function(player) {
                    var li = document.createElement('li');
                    li.textContent = player.first_name + ' ' + player.last_name + ' ';
                    var btn = document.createElement('button');
                    btn.textContent = 'Нанять за 100 монет';
                    btn.onclick = function() { hirePlayer(player.vk_id); };
                    li.appendChild(btn);
                    listElement.appendChild(li);
                });
            } catch (e) {
                listElement.innerHTML = '<li>Ошибка загрузки.</li>';
            }
        }

        async function hirePlayer(employeeVkId) {
            var companyName = 'Компания_' + currentUserVkId;
            var result = await supabase
                .from('players')
                .update({ company: companyName, status: 'Работает' })
                .eq('vk_id', employeeVkId);

            if (result.error) {
                alert('Ошибка найма!');
            } else {
                alert('Успешно нанят!');
                showOwnerPanel();
            }
        }

        // Кнопка повтора
        document.getElementById('force-init-btn').addEventListener('click', function() {
            document.getElementById('force-init-btn').style.display = 'none';
            initApp();
        });

        // Ждём, пока всё загрузится, потом стартуем
        window.addEventListener('load', function() {
            console.log('Страница загружена, запускаем приложение');
            startApp();
        });
    </script>
</body>
</html>
